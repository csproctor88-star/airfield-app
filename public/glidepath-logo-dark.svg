<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52" role="img" aria-label="Glidepath">
  <title>Glidepath</title>
  <!-- Glide slope geometry: descending approach line + runway baseline.
       Cyan accent matches --color-accent (#38BDF8). -->
  <g fill="none" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round">
    <!-- Descending approach -->
    <line x1="6" y1="10" x2="38" y2="34"/>
    <!-- Runway baseline -->
    <line x1="4" y1="42" x2="46" y2="42"/>
  </g>
  <!-- Aircraft mark at the touchdown end of the glide -->
  <path d="M 30 28 L 42 36 L 32 38 Z" fill="#38BDF8"/>
  <!-- Wordmark — system stack so we don't depend on a web font -->
  <text x="58" y="34"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="26" font-weight="700" letter-spacing="-0.4"
        fill="#F1F5F9">Glidepath</text>
</svg>
