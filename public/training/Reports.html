<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports Tab — Layout Exploration · AMTR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

  <style>
  /* ================================================================
     Inherit AMTR design tokens — copied verbatim from the live app
     so the Reports tab matches the rest of the system pixel-for-pixel.
     ================================================================ */
  :root {
    --font-sans: 'Public Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    --navy-900: #0f2235; --navy-800: #15324d; --navy-700: #1d4368; --navy-600: #2a5985;
    --gold: #b48a36; --gold-soft: #d6b15a;
    --ink: #11181f; --ink-2: #2c3a47; --muted: #5b6b7c; --muted-2: #8694a3;
    --line: #d9e0e8; --line-soft: #e9eef3;
    --bg: #f4f6f9; --panel: #ffffff; --panel-2: #fafbfd; --stripe: #f7f9fc;
    --ok: #1f7a3a; --ok-bg: #e3f3e7;
    --warn: #a36306; --warn-bg: #fbf0d8;
    --bad: #a52121; --bad-bg: #fbe5e5;
    --info: #1f5fa5; --info-bg: #e3edf8;
    --r-sm: 4px; --r-md: 6px; --r-lg: 10px;
    --shadow-1: 0 1px 0 rgba(15,34,53,0.04), 0 1px 2px rgba(15,34,53,0.06);
    --shadow-2: 0 2px 8px rgba(15,34,53,0.08), 0 1px 2px rgba(15,34,53,0.04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--ink);
    background: #1a1d23;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }

  /* App shell — inside an artboard, not full viewport */
  .app { display: grid; grid-template-rows: auto 1fr; background: var(--bg); min-height: 100%; }

  /* topbar */
  .topbar {
    background: var(--navy-900); color: #eaf0f6;
    display: flex; align-items: center; gap: 18px;
    padding: 10px 22px;
    border-bottom: 3px solid var(--gold);
  }
  .topbar .brand { display: flex; align-items: center; gap: 12px; }
  .topbar .seal {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 55%, #6f5117 100%);
    display: grid; place-items: center; color: #1c1305;
    font-family: var(--font-mono); font-weight: 700; font-size: 12px; letter-spacing: 0.5px;
    border: 1.5px solid #f0dba0; box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2);
  }
  .topbar .title { font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
  .topbar .spacer { flex: 1; }
  .topbar .control {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06);
    padding: 4px 10px; border-radius: var(--r-md);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
  }
  .topbar .control .label {
    color: #9fb3c8; font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: 0.5px; font-size: 10.5px;
  }
  .topbar select {
    background: transparent; color: #eaf0f6; border: none;
    font-family: inherit; font-size: 13px; padding: 4px 2px; outline: none; cursor: pointer;
  }
  .topbar select option { color: var(--ink); background: #fff; }
  .role-toggle {
    display: inline-flex;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--r-md); overflow: hidden;
  }
  .role-toggle button {
    background: transparent; color: #9fb3c8; border: none;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    letter-spacing: 0.3px;
  }
  .role-toggle button.active { background: var(--gold); color: #1c1305; font-weight: 600; }
  .icon-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #eaf0f6; font-size: 12px; padding: 6px 10px;
    border-radius: var(--r-sm); cursor: pointer;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.12); }

  /* body shell */
  .body-shell { display: grid; grid-template-columns: 248px 1fr; }
  .sidebar {
    background: #fff; border-right: 1px solid var(--line);
    padding: 18px 14px;
  }
  .nav-group { margin-bottom: 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; font-size: 13px;
    color: var(--ink-2); border-radius: var(--r-sm);
    cursor: pointer; margin-bottom: 2px;
    border: 1px solid transparent; background: transparent;
    width: 100%; text-align: left; font-family: inherit;
  }
  .nav-item.active { background: var(--navy-800); color: #f0f4f8; font-weight: 600; }
  .nav-tag {
    margin-left: auto;
    font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.5px;
    background: var(--gold); color: #1c1305;
    padding: 1px 6px; border-radius: 3px; font-weight: 700;
  }
  .nav-item.active .nav-tag { background: rgba(255,255,255,0.18); color: #fff; }

  /* main */
  .main { padding: 22px 26px 60px; max-width: 1400px; }

  /* page head */
  .page-head { display: flex; justify-content: space-between; align-items: flex-end; margin: 4px 0 16px; gap: 16px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin: 0; color: var(--ink); }
  .page-sub { font-size: 12px; color: var(--muted); font-family: var(--font-mono); letter-spacing: 0.3px; margin-top: 4px; }

  /* mode banner */
  .mode-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: #fff7e0;
    border: 1px solid #ecd28a; border-radius: var(--r-md);
    font-size: 12.5px; color: #6f4e0e; margin-bottom: 14px;
  }
  .mode-banner .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }
  .mode-banner.namt-banner {
    background: #e3edf8; border-color: #b6cce4; color: #1a4d80;
  }
  .mode-banner.namt-banner .dot { background: var(--info); }

  /* card */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    box-shadow: var(--shadow-1);
    overflow: hidden;
  }
  .card-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--panel-2);
    display: flex; align-items: center; gap: 12px;
    justify-content: space-between;
  }
  .card-head .title { font-size: 14px; color: var(--ink); }
  .card-head .sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .card-body { padding: 14px; }
  .card-body.flush { padding: 0; }

  /* sub-nav (Layout B) */
  .subnav {
    display: flex; gap: 2px;
    background: var(--panel-2);
    overflow-x: auto;
    padding: 0 8px;
  }
  .subnav button {
    background: transparent; border: none;
    padding: 12px 14px; font-size: 13px;
    color: var(--muted); font-weight: 500;
    border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap;
  }
  .subnav button.active {
    color: var(--navy-800); border-bottom-color: var(--navy-700); font-weight: 600;
  }
  .subnav button:hover:not(.active) { color: var(--ink-2); }

  /* metric cards */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric-grid.metric-grid-5 { grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }
  .metric {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-md); padding: 12px 14px;
  }
  .metric .lbl {
    font-size: 10.5px; color: var(--muted);
    letter-spacing: 0.6px; text-transform: uppercase; font-weight: 600;
  }
  .metric .val {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
    margin-top: 4px; color: var(--ink); font-family: var(--font-mono);
  }
  .metric.ok .val { color: var(--ok); }
  .metric.warn .val { color: var(--warn); }
  .metric.bad .val { color: var(--bad); }

  /* tables */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl thead th {
    font-size: 10px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--muted); background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    padding: 9px 12px; text-align: left; white-space: nowrap;
  }
  .tbl tbody td { padding: 8px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; }
  .tbl tbody tr:hover td { background: var(--stripe); }
  .tbl tbody tr:last-child td { border-bottom: none; }
  .tbl.tbl-fit thead th, .tbl.tbl-fit tbody td { padding: 7px 10px; }
  .tbl tbody tr.row-complete td { background: var(--ok-bg); }
  .tbl tbody tr.row-warn td     { background: var(--warn-bg); }
  .tbl tbody tr.row-overdue td  { background: var(--bad-bg); }
  .tbl tbody tr.row-warn:hover td { background: color-mix(in oklab, var(--warn-bg) 80%, #fff); }
  .tbl tbody tr.row-overdue:hover td { background: color-mix(in oklab, var(--bad-bg) 80%, #fff); }

  .mono-cell { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); }

  /* buttons (subset from app) */
  .btn {
    font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: var(--r-sm);
    border: 1px solid var(--line); background: #fff; color: var(--ink-2);
    cursor: pointer; font-family: inherit; letter-spacing: 0.2px;
  }
  .btn:hover { background: var(--stripe); border-color: var(--muted-2); }
  .btn.primary { background: var(--navy-700); color: #fff; border-color: var(--navy-700); }
  .btn.primary:hover { background: var(--navy-800); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--muted); }
  .btn.ghost:hover { color: var(--ink); background: var(--stripe); border-color: var(--line); }
  .btn.small { font-size: 11.5px; padding: 4px 8px; }

  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 600; padding: 2px 7px;
    border-radius: 3px;
    background: var(--line-soft); color: var(--ink-2);
    font-family: var(--font-mono); letter-spacing: 0.4px;
  }

  .sig { display: inline-flex; align-items: baseline; gap: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
  .sig .name { color: var(--ink-2); font-weight: 700; }

  /* ================================================================
     Reports-specific styles
     ================================================================ */
  .rpt-toolbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--r-md);
  }
  .rpt-filter-group { display: flex; align-items: center; gap: 10px; }
  .rpt-filter-label {
    font-size: 10.5px; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--muted); font-weight: 600;
  }
  .rpt-chip-group { display: inline-flex; gap: 2px; background: var(--stripe); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 2px; }
  .rpt-chip {
    background: transparent; border: none;
    padding: 4px 10px; font-size: 12px; color: var(--ink-2);
    border-radius: 3px; cursor: pointer; font-family: var(--font-mono);
  }
  .rpt-chip.active { background: var(--navy-700); color: #fff; font-weight: 600; }
  .rpt-toolbar-right { display: flex; gap: 8px; }

  /* mini progress bar */
  .mini-bar {
    position: relative; height: 16px; background: var(--line-soft);
    border-radius: 8px; overflow: hidden; min-width: 110px;
  }
  .mini-bar-fill { position: absolute; left: 0; top: 0; bottom: 0; transition: width 0.2s; }
  .mini-bar-fill.tone-ok { background: var(--ok); }
  .mini-bar-fill.tone-warn { background: var(--warn); }
  .mini-bar-fill.tone-bad { background: var(--bad); }
  .mini-bar-pct {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-mono); font-size: 10.5px;
    color: var(--ink); font-weight: 600;
    text-shadow: 0 1px 1px rgba(255,255,255,0.5);
  }

  /* status pill */
  .rpt-pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
    font-family: var(--font-mono); letter-spacing: 0.3px;
  }
  .rpt-pill.tone-ok { background: var(--ok-bg); color: var(--ok); border: 1px solid color-mix(in oklab, var(--ok) 30%, transparent); }
  .rpt-pill.tone-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid color-mix(in oklab, var(--warn) 30%, transparent); }
  .rpt-pill.tone-bad { background: var(--bad-bg); color: var(--bad); border: 1px solid color-mix(in oklab, var(--bad) 30%, transparent); }

  .rpt-row-link { cursor: pointer; }
  .rpt-row-link:hover .rpt-link-arrow { color: var(--navy-700); transform: translateX(2px); }
  .rpt-link-arrow {
    color: var(--muted-2); font-size: 18px; font-weight: 600;
    transition: transform 0.1s, color 0.1s; text-align: center;
  }
  .rpt-name { font-weight: 600; color: var(--ink); }
  .rpt-status { font-size: 11.5px; color: var(--ink-2); font-family: var(--font-mono); }

  /* matrix */
  .rpt-matrix thead th:not(:first-child) { text-align: center; }
  .rpt-matrix-cell { text-align: center; }
  .rpt-tick {
    font-size: 13px; color: var(--ok); font-weight: 700;
  }
  .rpt-tick-empty { color: var(--line); }

  /* Layout B overview grid */
  .rpt-overview-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* Member print panel */
  .rpt-print {
    padding: 18px; background: #fff;
    border: 1px solid var(--line); border-radius: var(--r-md);
    box-shadow: var(--shadow-2);
  }
  .rpt-print-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 12px; border-bottom: 2px solid var(--navy-700);
    margin-bottom: 14px;
  }
  .rpt-print-name { font-size: 20px; font-weight: 700; color: var(--ink); }
  .rpt-print-meta { font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top: 4px; }
  .rpt-print-seal {
    width: 50px; height: 50px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 55%, #6f5117 100%);
    color: #1c1305; font-family: var(--font-mono); font-weight: 700; font-size: 11px;
    display: grid; place-items: center;
    border: 1.5px solid #f0dba0;
  }
  .rpt-print-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 16px;
  }
  .rpt-print-box {
    border: 1px solid var(--line);
    border-radius: var(--r-sm); padding: 10px 12px;
    background: var(--panel-2);
  }
  .rpt-print-box-lbl {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--muted);
  }
  .rpt-print-box-val {
    font-size: 16px; font-weight: 700; color: var(--ink);
    font-family: var(--font-mono); margin: 4px 0 6px;
  }
  .rpt-print-status-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .rpt-print-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .rpt-muted { color: var(--muted); font-size: 12.5px; }
  .rpt-print-section { margin-top: 14px; }
  .rpt-print-section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--muted-2);
    border-bottom: 1px solid var(--line); padding-bottom: 6px; margin-bottom: 8px;
  }
  .rpt-print-sig {
    margin-top: 22px; display: flex; gap: 28px; flex-wrap: wrap;
    padding-top: 14px; border-top: 1px solid var(--line);
  }
  .rpt-select {
    background: #fff; border: 1px solid var(--line);
    border-radius: var(--r-sm); padding: 4px 8px; font-size: 12px;
    font-family: inherit; color: var(--ink);
  }

  /* Hide design-canvas reset button (kept hidden so the screenshot stays clean) */
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="reports-data.js"></script>
</head>
<body>
  <div id="canvas-root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="reports-shell.jsx"></script>
  <script type="text/babel" src="reports-a.jsx"></script>
  <script type="text/babel" src="reports-b.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas title="Reports tab — NAMT/AFM only">
          <DCSection id="reports" title="Reports tab — 2 layouts">
            <DCArtboard id="layout-a" label="A · Single scroll page" width={1400} height={2400}>
              <window.ReportsLayoutA />
            </DCArtboard>
            <DCArtboard id="layout-b" label="B · Sub-tabbed (Overview default)" width={1400} height={1600}>
              <window.ReportsLayoutB />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('canvas-root')).render(<App />);
  </script>
</body>
</html>
