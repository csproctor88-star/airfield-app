<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inspect tr2</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<pre id="out" style="font: 11px ui-monospace, monospace; white-space: pre-wrap;"></pre>
<script>
(async () => {
  const out = document.getElementById('out');
  const log = (...a) => { out.textContent += a.map(x => typeof x === 'string' ? x : JSON.stringify(x, null, 2)).join(' ') + '\n'; };
  const r = await fetch('tr2.xlsx');
  const buf = await r.arrayBuffer();
  const wb = XLSX.read(buf, { type: 'array', cellDates: true });
  log('SHEETS:', wb.SheetNames);
  for (const name of wb.SheetNames) {
    const ws = wb.Sheets[name];
    log(name, '— !ref:', ws['!ref']);
  }
  // Focus on the 1098 sheets
  for (const name of wb.SheetNames.filter(n => n.includes('1098'))) {
    log('\n=== ' + name + ' ===');
    const ws = wb.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false, raw: false });
    log('rows:', rows.length);
    for (let i = 0; i < Math.min(rows.length, 60); i++) {
      let last = rows[i].length;
      while (last > 0 && (rows[i][last-1] === '' || rows[i][last-1] == null)) last--;
      if (last === 0) continue;
      const trimmed = rows[i].slice(0, last).map(c => (typeof c === 'string' && c.length > 100) ? c.slice(0,100)+'…' : c);
      log('R' + String(i+1).padStart(3,'0') + ':', JSON.stringify(trimmed));
    }
  }
  window.__INSPECTED = true;
})();
</script>
</body>
</html>
